<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson | ShaderDojo</title>
    <link rel="icon" type="image/png" href="./imgs/favicon.ico">
    <link rel="stylesheet" href="./css/design.css">
</head>

<body>
    <header class="app-header">
        <div class="container">
            <a href="index.html" class="brand">
                <span class="brand-mark"></span>
                ShaderDojo
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="profile.html">Profile</a></li>
                </ul>
                <button class="menu-toggle" onclick="toggleDrawer()" aria-label="Menu">☰</button>
            </nav>
        </div>
    </header>
    <div id="drawer" class="drawer">
        <a href="courses.html" onclick="closeDrawer()">Courses</a>
        <a href="profile.html" onclick="closeDrawer()">Profile</a>
    </div>
    <script src="./scripts/drawer.js"></script>

    <main class="lesson-shell">
        <div class="container">
            <nav class="crumbs">
                <a href="courses.html">Courses</a>
                <span class="sep">/</span>
                <span id="crumb-course" class="text-dim">Course</span>
                <span class="sep">/</span>
                <span id="crumb-lesson" style="color: var(--text);">Lesson</span>
            </nav>

            <div class="lesson-header">
                <h1 class="problem-title">Loading lesson…</h1>
                <p class="status-text">Fetching status…</p>
            </div>

            <div class="lesson-description problem-description"></div>

            <div class="lesson-workspace">
                <div class="editor-pane">
                    <div class="pane-header">
                        <span>Fragment shader</span>
                        <button id="codeResetButton" type="button" title="Reset code">↻ Reset</button>
                    </div>
                    <form>
                        <div id="editor"></div>
                    </form>
                </div>

                <div class="canvas-pane">
                    <div class="pane-header"><span>Output</span></div>
                    <canvas id="shaderCanvas"></canvas>
                    <div class="shader-controllers">
                        <div>
                            <button id="pausePlayButton">❚❚</button>
                            <div id="timeDisplay" class="time-display"></div>
                        </div>
                        <div>
                            <input type="number" id="manualTime" min="0" max="10000" step="0.1" placeholder="Start t">
                            <button id="resetButton">↻</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lesson-actions">
                <span class="status-text" id="lesson-hint"></span>
                <div class="lesson-buttons">
                    <button type="button" class="button2" onclick="buttonClick(this); runNewShader()">Run</button>
                    <button type="button" class="button1" onclick="buttonClick(this); submitShader()">Submit</button>
                </div>
            </div>

            <section class="comments-section">
                <h2>Discussion</h2>
                <div class="comments" id="comments">Loading comments…</div>

                <div class="post-comment">
                    <h3 style="margin-bottom: var(--s-3);">Post your own solution</h3>
                    <form onsubmit="return postComment(event)" method="POST">
                        <textarea placeholder="Paste your shader code" rows="8" id="code-post" name="code-post"></textarea>
                        <input type="text" id="content-post" name="content-post"
                            placeholder="One-line description of what makes your solution different">
                        <button type="submit" class="submit-button" onclick="buttonClick(this)">Post</button>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span id="closeModalBtn" class="close">&times;</span>
            <h2 id="result-status"></h2>
            <p id="processing-status"></p>
            <div class="button-container" id="modal-button-container"></div>
        </div>
    </div>

    <div id="error-modal" class="error-modal">
        <div class="error-modal-content">
            <p id="error-modal-message"></p>
            <span id="close-error-ModalBtn" class="close-error">&times;</span>
        </div>
    </div>

    <footer class="app-footer">
        <div class="container">
            <span>ShaderDojo</span>
            <a href="mailto:noah@noahhaile.com">noah@noahhaile.com</a>
        </div>
    </footer>

    <script>
        (async function bootstrapLesson() {
            const params = new URLSearchParams(location.search);
            const lessonId = params.get('id');

            if (!lessonId) {
                document.querySelector('.problem-title').textContent = 'No lesson selected';
                document.querySelector('.problem-description').textContent = 'Pick a lesson from the Courses page.';
                return;
            }

            window.redirectUrl = `login.html?redirect=${encodeURIComponent('lesson.html?id=' + lessonId)}`;

            let lesson;
            try {
                const r = await fetch(`${location.origin}/app/lessons/${encodeURIComponent(lessonId)}`);
                if (!r.ok) throw new Error('status ' + r.status);
                lesson = await r.json();
            } catch (e) {
                document.querySelector('.problem-title').textContent = 'Lesson not found';
                document.querySelector('.problem-description').textContent = 'This lesson could not be loaded.';
                return;
            }

            window.id = lesson.id;
            window.fragmentShaderSourceBody = lesson.starterFragmentShader || '';
            window.pageUrl = `lesson/${lesson.id}`;
            window.lessonContext = { lessonId: lesson.id, courseSlug: lesson.courseSlug };

            document.title = `${lesson.title} | ShaderDojo`;
            document.querySelector('.problem-title').textContent = lesson.title;
            document.querySelector('.problem-description').textContent = lesson.description || '';

            const crumbCourse = document.getElementById('crumb-course');
            if (lesson.courseSlug) {
                crumbCourse.innerHTML = '';
                const a = document.createElement('a');
                a.href = 'courses.html';
                a.textContent = lesson.courseTitle || lesson.courseSlug;
                crumbCourse.appendChild(a);
            } else if (lesson.courseTitle) {
                crumbCourse.textContent = lesson.courseTitle;
            }
            document.getElementById('crumb-lesson').textContent = lesson.title;

            if (!lesson.verified) {
                document.getElementById('lesson-hint').textContent = 'Exploratory lesson — no automatic grading.';
            }

            const scripts = [
                './scripts/shaderControllers.js',
                './scripts/shaderFunctions.js',
                './scripts/loadScreen.js',
                './scripts/errorModal.js',
                './scripts/modal.js',
                './scripts/problemApi.js',
                './scripts/button.js',
                './lib/ace/ace.js',
                './lib/ace/mode.js',
                './lib/ace/theme.js',
                './scripts/editor-setup.js',
                './lib/sha256.js',
                './scripts/shader.js',
                './scripts/discussion.js',
            ];
            for (const src of scripts) {
                await new Promise((resolve, reject) => {
                    const s = document.createElement('script');
                    s.src = src;
                    s.onload = resolve;
                    s.onerror = () => reject(new Error('Failed to load ' + src));
                    document.body.appendChild(s);
                });
            }
        })();
    </script>
</body>

</html>
