<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | ShaderDojo</title>
    <link rel="icon" type="image/png" href="./imgs/favicon.ico">
    <link rel="stylesheet" href="./css/design.css">
</head>

<body>
    <header class="app-header">
        <div class="container">
            <a href="index.html" class="brand">
                <span class="brand-mark"></span>
                ShaderDojo
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="courses.html">Courses</a></li>
                </ul>
                <button class="menu-toggle" onclick="toggleDrawer()" aria-label="Menu">☰</button>
            </nav>
        </div>
    </header>
    <div id="drawer" class="drawer">
        <a href="courses.html" onclick="closeDrawer()">Courses</a>
    </div>
    <script src="./scripts/drawer.js"></script>

    <main class="auth-shell">
        <div class="container">
            <form class="card auth-form" onsubmit="return login(event)" method="POST">
                <h1>Sign in</h1>
                <div class="form-group">
                    <label for="username">Username or email</label>
                    <input type="text" id="username" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--s-2);" onclick="buttonClick(this)">Sign in</button>
            </form>

            <form class="card auth-form" onsubmit="buttonClick(this); return register(event)" method="POST">
                <h1>Create account</h1>
                <div class="form-group">
                    <label for="email-signup">Email</label>
                    <input type="email" id="email-signup" name="email" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="username-signup">Username</label>
                    <input type="text" id="username-signup" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="password-signup">Password</label>
                    <input type="password" id="password-signup" name="password" autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm password</label>
                    <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--s-2);" onclick="buttonClick(this)">Create account</button>
            </form>
        </div>
    </main>

    <div id="error-modal" class="error-modal">
        <div class="error-modal-content">
            <p id="error-modal-message"></p>
            <span id="close-error-ModalBtn" class="close-error">&times;</span>
        </div>
    </div>

    <footer class="app-footer">
        <div class="container">
            <span>ShaderDojo</span>
            <a href="mailto:noah@noahhaile.com">noah@noahhaile.com</a>
        </div>
    </footer>

    <script src="./scripts/button.js"></script>
    <script src="./scripts/errorModal.js"></script>
    <script src="./scripts/login.js"></script>
</body>

</html>
