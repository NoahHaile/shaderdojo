worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cap inbound bodies — shaders are tiny; this protects upstream services.
    client_max_body_size 256k;

    upstream auth_upstream { server auth:8080; }
    upstream app_upstream  { server app:8080;  }

    server {
        listen 80 default_server;
        server_name _;

        # ---- Static frontend ----
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }

        # ---- Reverse proxy to auth service ----
        # Trailing slash on proxy_pass strips the /auth prefix before forwarding.
        location /auth/ {
            proxy_pass         http://auth_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ---- Reverse proxy to app service ----
        location /app/ {
            proxy_pass         http://app_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # /problems/verify renders a shader synchronously upstream; give it room.
            proxy_read_timeout 60s;
        }
    }
}
