worker_processes auto;
events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 256k;

    upstream backend_upstream {
        server backend:8080;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA fallback: any path that isn't a real file falls through to index.html
        # so react-router can pick it up client-side.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Built JS/CSS get long-cache headers; index.html stays no-cache so deploys
        # always pick up the latest hash references.
        location ~* \.(?:js|css|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|webp|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        location = /index.html {
            add_header Cache-Control "no-store";
        }

        location /auth/ {
            proxy_pass         http://backend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location /app/ {
            proxy_pass         http://backend_upstream/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
