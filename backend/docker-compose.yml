services:
  auth:
    build:
      context: auth
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shader_dojo
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_KEY: ${JWT_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shaderdojo-network
    restart: unless-stopped

  app:
    build:
      context: app
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shader_dojo
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_KEY: ${JWT_KEY}
      API_KEY: ${API_KEY}
      VALIDATOR_URL: http://validator:3000/execute-shader
      VALIDATOR_KEY: ${VALIDATOR_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
      validator:
        condition: service_healthy
    networks:
      - shaderdojo-network
    restart: unless-stopped

  validator:
    build:
      context: ../validator
      dockerfile: Dockerfile
    environment:
      VALIDATOR_KEY: ${VALIDATOR_KEY}
      MAX_CONCURRENT_RENDERS: ${VALIDATOR_MAX_CONCURRENT_RENDERS:-2}
      RENDER_TIMEOUT_MS: ${VALIDATOR_RENDER_TIMEOUT_MS:-5000}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - shaderdojo-network
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: shader-dojo-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Postgres is NOT published to the host by default. Uncomment for local DB tools.
    # ports:
    #   - "127.0.0.1:${DB_PORT:-7088}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d shader_dojo"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - shaderdojo-network
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - auth
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend:/usr/share/nginx/html:ro
    networks:
      - shaderdojo-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-shader-dojo
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-7089}:80"
    networks:
      - shaderdojo-network

volumes:
  postgres_data:

networks:
  shaderdojo-network:
    driver: bridge
